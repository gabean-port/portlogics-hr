<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>수습 관리 자동화</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#eef1f6;color:#111827;font-size:14px;min-height:100vh}
.app{max-width:820px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,#1a3558 0%,#24527a 100%);color:white;padding:20px 24px;border-radius:14px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.header-icon{width:44px;height:44px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.header h1{font-size:18px;font-weight:700}
.header p{font-size:12px;opacity:.65;margin-top:2px}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;padding:10px 8px;border:none;background:white;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:#6b7280;transition:all .18s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab.active{background:#1a3558;color:white;box-shadow:0 2px 8px rgba(26,53,88,.3)}
.card{background:white;border-radius:14px;padding:20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-title{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px}
.alert-card{background:white;border-radius:12px;padding:15px 18px;margin-bottom:10px;border-left:4px solid #e5e7eb;display:flex;align-items:flex-start;gap:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.alert-card.overdue{border-color:#ef4444}
.alert-card.today{border-color:#3b82f6}
.alert-card.sch-ch{border-color:#8b5cf6}
.alert-card.sch-dm{border-color:#10b981}
.alert-card.unscheduled{border-color:#f59e0b;background:#fffbeb}
.alert-info{flex:1;min-width:0}
.alert-name{font-weight:700;font-size:15px}
.alert-desc{font-size:13px;color:#6b7280;margin-top:3px}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;margin-top:6px}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-green{background:#d1fae5;color:#065f46}
.badge-gray{background:#f3f4f6;color:#6b7280}
.badge-purple{background:#ede9fe;color:#7c3aed}
.badge-teal{background:#d1fae5;color:#065f46}
.badge-amber{background:#fef3c7;color:#92400e}
.btn{padding:8px 16px;border:none;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;transition:all .18s;white-space:nowrap}
.btn-primary{background:#1a3558;color:white}
.btn-primary:hover{background:#152c49}
.btn-primary:disabled{background:#93aec9;cursor:not-allowed}
.btn-ghost{background:transparent;border:1.5px solid #d1d5db;color:#374151}
.btn-ghost:hover{background:#f9fafb}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-amber{background:#fef3c7;color:#92400e;border:1.5px solid #fde68a}
.btn-amber:hover{background:#fde68a}
.form-group{margin-bottom:13px}
.form-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
.form-label span{color:#ef4444}
.form-input{width:100%;padding:8px 11px;border:1.5px solid #e5e7eb;border-radius:9px;font-size:13px;outline:none;transition:border-color .18s;background:white;color:#111827}
.form-input:focus{border-color:#1a3558}
select.form-input{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:#9ca3af;margin-top:4px}
.ev-section{border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:13px}
.ev-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.ev-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-bottom:6px}
.badge-12{background:#dbeafe;color:#1d4ed8}
.badge-3{background:#fef3c7;color:#92400e}
.badge-emp{background:#d1fae5;color:#065f46}
.preview-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:9px;padding:15px;font-size:12px;line-height:1.75;white-space:pre-wrap;font-family:'Courier New',monospace;color:#334155;max-height:280px;overflow-y:auto}
.tl-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#f8fafc;border-radius:9px;margin-bottom:6px}
.tl-date{font-size:12px;color:#6b7280;min-width:95px;font-weight:500}
.tl-content{flex:1}
.tl-label{font-size:13px;font-weight:600;color:#111827}
.tl-now{background:#eff6ff;border:1px solid #bfdbfe}
.empty-state{text-align:center;padding:52px 24px;color:#9ca3af}
.empty-icon{font-size:52px;margin-bottom:16px}
.empty-state h3{font-size:15px;font-weight:600;color:#374151;margin-bottom:6px}
.log-box{font-size:12px;background:#0f172a;color:#4ade80;padding:12px;border-radius:9px;font-family:monospace;max-height:180px;overflow-y:auto;white-space:pre-wrap;margin-top:10px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.emp-row{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid #f3f4f6}
.emp-row:last-child{border:none}
.emp-avatar{width:42px;height:42px;background:#1a3558;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:17px;flex-shrink:0}
.emp-meta{flex:1;min-width:0}
.emp-name{font-weight:700;font-size:15px}
.emp-dept{font-size:12px;color:#6b7280;margin-top:2px}
.progress{display:flex;gap:5px;margin-top:8px}
.pdot{height:6px;border-radius:3px;flex:1}
.pdot-sent{background:#10b981}
.pdot-sch{background:#8b5cf6}
.pdot-due{background:#ef4444}
.pdot-pending{background:#d1d5db}
.pdot-cancelled{background:#fca5a5}
.sep{border:none;border-top:1px solid #f3f4f6;margin:14px 0}
.msg-tab-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.msg-tab{padding:5px 12px;border-radius:7px;border:1.5px solid #e5e7eb;background:white;font-size:12px;cursor:pointer;font-weight:500;color:#6b7280}
.msg-tab.active{border-color:#1a3558;background:#1a3558;color:white}
.ch-tag{display:inline-flex;align-items:center;background:#1a3558;color:white;padding:4px 10px;border-radius:7px;font-size:12px;font-weight:600}
.btn-group{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.info-banner{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px 16px;font-size:12px;color:#166534;margin-bottom:14px}
.flow-title{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
</style>
</head>
<body>
<div style="background:#fef3c7;border:1px solid #fde68a;color:#92400e;padding:12px 16px;border-radius:10px;margin:12px auto;max-width:820px;font-size:13px;line-height:1.6">
⚠ <b>미리보기 전용 버전입니다.</b> 각 일정에 맞춰 <b>"메시지 복사"</b> 버튼을 누르면 클립보드에 복사됩니다. Slack에 직접 붙여넣어 발송해 주세요.
</div>
<div class="app">
  <div class="header">
    <div class="header-icon">🧑‍💼</div>
    <div><h1>수습 관리 자동화</h1><p>PORTLOGICS HR · Slack 자동 알림 시스템</p></div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tb-dash" onclick="switchTab('dash')">📋 오늘 할 일</button>
    <button class="tab" id="tb-reg"  onclick="switchTab('reg')">➕ 신규 등록</button>
    <button class="tab" id="tb-list" onclick="switchTab('list')">📊 전체 현황</button>
  </div>
  <div id="pane-dash"></div>
  <div id="pane-reg"  style="display:none"></div>
  <div id="pane-list" style="display:none"></div>
</div>
<script>
// 자동 전송 비활성화 — 메시지는 복사 후 Slack에 직접 붙여넣기
const STORE_KEY="portlogics_probation_v7";
const CH_KEY="portlogics_ch_default";
const KO_DAYS=["일","월","화","수","목","금","토"];
const DEFAULT_CH_NAME="인사팀-채용알림-test";
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const toISO=d=>d.toISOString().split("T")[0];
const fmtS=d=>`${d.getMonth()+1}/${d.getDate()}(${KO_DAYS[d.getDay()]})`;
const fmtL=d=>`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} (${KO_DAYS[d.getDay()]})`;
const toSlackTs=s=>Math.floor(new Date(s+"T00:00:00Z").getTime()/1000);
const todayStr=()=>new Date().toISOString().split("T")[0];
const isDmMsg=id=>id==="self1"||id==="self2";
function calcSched(h,months){
  const hire=new Date(h+"T00:00:00");
  const pe=new Date(hire);pe.setMonth(pe.getMonth()+parseInt(months));pe.setDate(pe.getDate()-1);
  const wS=n=>addDays(hire,(n-1)*7),wE=n=>addDays(hire,n*7-1);
  return{hire,probEnd:pe,goalEnd:addDays(hire,13),self1S:wS(6),self1E:wE(6),down1S:wS(7),down1E:wE(7),self2S:wS(10),self2E:wE(10),down2S:wS(11),down2E:wE(11),down3S:wS(12),down3E:addDays(wS(12),2),result:addDays(wS(12),6)};
}
function msgMain(e,sc){return `*[${e.name}님 수습기간 타임라인]*\n소속 : ${e.dept} - ${e.team}\n수습기간 : ${fmtL(sc.hire)} – ${fmtL(sc.probEnd)}\n※ 목표 작성 및 평가 항목 승인 & 1차/2차 하향 평가를 진행하여 주시기 바랍니다.\n\n■ 목표 작성 및 평가 항목 승인 : ${fmtS(sc.hire)} – ${fmtS(sc.goalEnd)}\n■ 1차 수습 평가\nㆍ셀프 1차 : ${fmtS(sc.self1S)} – ${fmtS(sc.self1E)}\nㆍ하향 1차 : ${fmtS(sc.down1S)} – ${fmtS(sc.down1E)}\n■ 2차 수습 평가\nㆍ셀프 2차 : ${fmtS(sc.self2S)} – ${fmtS(sc.self2E)}\nㆍ하향 2차 : ${fmtS(sc.down2S)} – ${fmtS(sc.down2E)}\n■ 3차 수습 평가\nㆍ하향 3차 : ${fmtS(sc.down3S)} – ${fmtS(sc.down3E)}\n■ 결과 안내 : ${fmtS(sc.result)}`;}
function msgGoal(e,sc){return `[ 목표 설정 ] <@${e.supId12}>\n* 작성 기한 : ${fmtS(sc.goalEnd)} 까지\n* 진행 내용 : ${e.name}님과 함께 수습기간 동안 달성할 목표 작성 (달성 가능한 목표로 작성)\n* 작성 공간 : flex - 목표 - [${e.flexTeam}] ${e.name}님 수습 목표`;}
function msgEval1(e,sc){return `[ 1차 하향 평가 ] <@${e.supId12}>\n* 작성 기간 : ${fmtS(sc.down1S)} – ${fmtS(sc.down1E)}\n* 작성 내용 : ${e.name}님의 수습 기간에 대한 전반적인 평가\n* 작성 방법 : flex - 홈 피드(알림) - [${e.flexTeam}] ${e.name}님 수습 평가 작성\n   * 우측 참고자료 내 작성 내용 참고하여 작성 진행`;}
function msgEval2(e,sc){return `[ 2차 하향 평가 ] <@${e.supId12}>\n* 작성 기간 : ${fmtS(sc.down2S)} – ${fmtS(sc.down2E)}\n* 작성 내용 : ${e.name}님의 수습 기간에 대한 2차 하향 평가\n* 작성 방법 : flex - 홈 피드(알림) - [${e.flexTeam}] ${e.name}님 수습 평가 작성\n   * 우측 참고자료 내 작성 내용 참고하여 작성 진행`;}
function msgEval3(e,sc){return `[ 3차 하향 평가 ] <@${e.supId3}>\n소속 : ${e.dept} - ${e.team}\n수습기간 : ${fmtL(sc.hire)} – ${fmtL(sc.probEnd)}\n\n* 작성 기간 : ${fmtS(sc.down3S)} – ${fmtS(sc.down3E)}\n* 작성 내용 : ${e.name}님의 수습에 대한 최종 평가\n* 작성 방법 : flex - 홈 피드(알림) - [${e.flexTeam}] ${e.name}님 수습 평가 작성`;}
function msgSelf1(e,sc){return `[ 1차 셀프 평가 ] <@${e.empId}>\n* 작성 기한 : ${fmtS(sc.self1S)} – ${fmtS(sc.self1E)}\n* 작성 방법 : flex → 할 일 → 1차 수습평가 작성하기`;}
function msgSelf2(e,sc){return `[ 2차 셀프 평가 ] <@${e.empId}>\n* 작성 기한 : ${fmtS(sc.self2S)} – ${fmtS(sc.self2E)}\n* 작성 방법 : flex → 할 일 → 2차 수습평가 작성하기`;}
function msgEmpInitialDM(e,sc){return `안녕하세요. ${e.name} 님.\n포트로직스의 입사를 축하드립니다.\n\n포트로직스는 3개월의 수습기간을 두고 있으며, 관련하여 아래와 같이 안내드립니다.\n※ 수습 평가 진행 안내 <https://www.notion.so/2b7dd60e86f480869e76eb8886a1652d|가이드 링크>\n\n* 수습기간 : ${fmtL(sc.hire)} – ${fmtL(sc.probEnd)}\n* 목표 작성 기간 : ${fmtS(sc.hire)} – ${fmtS(sc.goalEnd)}\n   * 작성 방법 : flex → 목표 → [${e.flexTeam}] ${e.name}님 수습 목표 → 할일 → 평가 항목 작성하기\n* 1차 셀프 평가 : ${fmtS(sc.self1S)} – ${fmtS(sc.self1E)}\n* 2차 셀프 평가 : ${fmtS(sc.self2S)} – ${fmtS(sc.self2E)}\n\n문의 사항이 있으신 경우 인사팀으로 문의하여 주시기 바랍니다!\n감사합니다.`;}
let employees=[],defaultChannelId="";
async function loadData(){
  try{const r=await window.storage.get(STORE_KEY);employees=r?JSON.parse(r.value):[];}catch{employees=[];}
  try{const c=await window.storage.get(CH_KEY);defaultChannelId=c?c.value:"";}catch{}
}
async function saveData(){try{await window.storage.set(STORE_KEY,JSON.stringify(employees));}catch(e){console.error(e);}}
async function saveDefaultChannel(id){try{await window.storage.set(CH_KEY,id);defaultChannelId=id;}catch{}}
function makeEmployee(d){
  const sc=calcSched(d.hireDate,d.months);
  const mk=(id,label,date)=>({id,label,date,status:"pending",sentAt:null,scheduledMsgId:null});
  return{id:"emp_"+Date.now(),name:d.name,dept:d.dept,team:d.team,flexTeam:d.flexTeam,hireDate:d.hireDate,months:parseInt(d.months),channelId:d.channelId,empId:d.empId,supId12:d.supId12,supId3:d.supId3,parentTs:null,dmChannelId:null,dmParentTs:null,
    messages:[mk("initial","입사 당일 (채널 공지 + DM)",d.hireDate),mk("self1","1차 셀프 평가 (수습자 DM 스레드)",toISO(sc.self1S)),mk("eval1","1차 하향 평가 (채널 스레드)",toISO(sc.down1S)),mk("self2","2차 셀프 평가 (수습자 DM 스레드)",toISO(sc.self2S)),mk("eval2","2차 하향 평가 (채널 스레드)",toISO(sc.down2S)),mk("eval3","3차 하향 평가 (채널 스레드)",toISO(sc.down3S))]};
}
async function callSlack(){return{success:false,error:"자동 전송 비활성화"};}
async function sendInitial(){return{success:true};}
async function scheduleChannelMsgs(){return{success:true};}
async function scheduleDmMsgs(){return{success:true};}
async function callSendNow(){return{success:false,error:"자동 전송 비활성화"};}
async function callCancelSchedule(){return{success:true};}
function switchTab(t){
  ["dash","reg","list"].forEach(k=>{document.getElementById("pane-"+k).style.display=k===t?"":"none";document.getElementById("tb-"+k).className="tab"+(k===t?" active":"");});
  if(t==="dash")renderDash();if(t==="reg")renderReg();if(t==="list")renderList();
}
function renderDash(){
  const pane=document.getElementById("pane-dash"),td=todayStr();
  const schItems=[],pendItems=[],unschItems=[];
  employees.forEach(emp=>emp.messages.forEach(msg=>{
    if(msg.status==="scheduled")schItems.push({emp,msg});
    else if(msg.status==="pending"||msg.status==="cancelled"){if(msg.date<=td)pendItems.push({emp,msg});else if(msg.id!=="initial")unschItems.push({emp,msg});}
  }));
  if(!schItems.length&&!pendItems.length&&!unschItems.length){pane.innerHTML=`<div class="card"><div class="empty-state"><div class="empty-icon">✅</div><h3>오늘 할 일이 없어요</h3><p>모든 수습 알림이 정상 처리되었습니다.</p></div></div>`;return;}
  let html="";
  if(schItems.length){
    html+=`<div class="card"><div class="card-title">📅 Slack 예약 발송 중 · ${schItems.length}건</div><div class="info-banner">💡 아래 메시지는 Slack에 예약되어 지정 날짜 09:00에 자동 발송됩니다.</div>`;
    schItems.forEach(({emp,msg})=>{const dm=isDmMsg(msg.id);const daysLeft=Math.round((new Date(msg.date)-new Date(td))/86400000);
      html+=`<div class="alert-card ${dm?"sch-dm":"sch-ch"}" id="ac-${emp.id}-${msg.id}"><div class="alert-info"><div class="alert-name">${emp.name} <span style="font-weight:400;font-size:13px;color:#6b7280">· ${emp.team}</span></div><div class="alert-desc">${msg.label}</div><span class="badge ${dm?"badge-teal":"badge-purple"}">${dm?"📱":"📢"} 예약됨 · ${msg.date} (${daysLeft>0?daysLeft+"일 후":"오늘"})</span><div id="log-${emp.id}-${msg.id}" class="log-box" style="display:none"></div></div><div class="btn-group"><button class="btn btn-primary btn-sm" id="snbtn-${emp.id}-${msg.id}" onclick="handleSendNow('${emp.id}','${msg.id}')">메시지 복사</button><button class="btn btn-danger btn-sm" id="cxbtn-${emp.id}-${msg.id}" onclick="handleCancelSchedule('${emp.id}','${msg.id}')">취소 표시</button></div></div>`;});
    html+="</div>";}
  if(pendItems.length){
    html+=`<div class="card"><div class="card-title">📨 수동 전송 필요 · ${pendItems.length}건</div>`;
    pendItems.forEach(({emp,msg})=>{const overdue=msg.date<td;const diffDays=overdue?Math.round((new Date(td)-new Date(msg.date))/86400000):0;
      const badgeHtml=msg.status==="cancelled"?`<span class="badge badge-gray">예약 취소됨</span>`:overdue?`<span class="badge badge-red">⚠ ${diffDays}일 지연</span>`:`<span class="badge badge-blue">오늘 전송</span>`;
      html+=`<div class="alert-card ${overdue?"overdue":"today"}" id="ac-${emp.id}-${msg.id}"><div class="alert-info"><div class="alert-name">${emp.name} <span style="font-weight:400;font-size:13px;color:#6b7280">· ${emp.team}</span></div><div class="alert-desc">${msg.label}</div><div style="display:flex;align-items:center;gap:8px;margin-top:4px">${badgeHtml}<span style="font-size:11px;color:#9ca3af">${msg.date}</span></div><div id="log-${emp.id}-${msg.id}" class="log-box" style="display:none"></div></div><button class="btn btn-primary btn-sm" id="sbtn-${emp.id}-${msg.id}" onclick="handleManualSend('${emp.id}','${msg.id}')">메시지 복사</button></div>`;});
    html+="</div>";}
  if(unschItems.length){
    const byEmp={};unschItems.forEach(({emp,msg})=>{if(!byEmp[emp.id])byEmp[emp.id]={emp,msgs:[]};byEmp[emp.id].msgs.push(msg);});
    html+=`<div class="card"><div class="card-title">⚠ 예약 미완료 · 재시도 필요</div>`;
    Object.values(byEmp).forEach(({emp,msgs})=>{html+=`<div class="alert-card unscheduled" id="ub-${emp.id}"><div class="alert-info"><div class="alert-name">${emp.name} <span style="font-weight:400;font-size:13px;color:#6b7280">· ${emp.team}</span></div><div class="alert-desc">${msgs.map(m=>m.label).join(", ")}</div><span class="badge badge-amber">⚠ ${msgs.length}개 메시지 예약 필요</span><div id="rlog-${emp.id}" class="log-box" style="display:none"></div></div><button class="btn btn-amber btn-sm" id="rbtn-${emp.id}" onclick="handleReSchedule('${emp.id}')">다시 표시</button></div>`;});
    html+="</div>";}
  pane.innerHTML=html;
}
async function handleManualSend(empId,msgId){
  const emp=employees.find(e=>e.id===empId),msg=emp?.messages.find(m=>m.id===msgId);if(!emp||!msg)return;
  const sc=calcSched(emp.hireDate,emp.months);
  const builders={initial:msgMain,goal:msgGoal,self1:msgSelf1,self2:msgSelf2,eval1:msgEval1,eval2:msgEval2,eval3:msgEval3};
  const text=(builders[msgId]||(()=>"메시지 템플릿 없음"))(emp,sc);
  const btn=document.getElementById("sbtn-"+empId+"-"+msgId);
  try{await navigator.clipboard.writeText(text);btn.textContent="✓ 복사됨 — Slack에 붙여넣기";setTimeout(()=>{btn.textContent="메시지 복사";},2500);
    if(confirm("메시지가 복사되었습니다. Slack에 붙여넣기를 완료하셨나요?\n\n'확인'을 누르면 이 항목을 '처리 완료'로 표시합니다.")){
      msg.status="sent";msg.sentAt=new Date().toISOString();await saveData();renderDash();renderList();
    }
  }catch(e){alert("복사 실패: "+e.message);}
}
async function handleSendNow(empId,msgId){return handleManualSend(empId,msgId);}
async function handleCancelSchedule(empId,msgId){
  const emp=employees.find(e=>e.id===empId),msg=emp?.messages.find(m=>m.id===msgId);if(!emp||!msg)return;
  if(confirm("이 메시지를 '취소' 상태로 표시할까요? (자동 전송 기능이 없으므로 실제 예약 취소는 없습니다)")){
    msg.status="cancelled";await saveData();renderDash();renderList();
  }
}

async function handleReSchedule(empId){
  const emp=employees.find(e=>e.id===empId);if(!emp)return;
  emp.messages.forEach(m=>{if(m.status==="cancelled")m.status="pending";});
  await saveData();renderDash();renderList();
}

async function doRegister(){

  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>저장 중...';logEl.style.display="block";logEl.textContent="";
  const log=m=>{logEl.textContent+=m+"\n";logEl.scrollTop=logEl.scrollHeight;};
  await saveDefaultChannel(d.channelId);
  const emp=makeEmployee(d);
  employees.push(emp);await saveData();
  log("✓ 수습자 등록 완료");
  log("→ 대시보드에서 각 일정에 맞춰 메시지를 복사해 Slack에 직접 붙여넣어 주세요.");

}
function renderList(){
  const pane=document.getElementById("pane-list");
  if(!employees.length){pane.innerHTML=`<div class="card"><div class="empty-state"><div class="empty-icon">📭</div><h3>등록된 수습자가 없습니다</h3><p style="margin-top:12px"><button class="btn btn-primary btn-sm" onclick="switchTab('reg')">신규 등록하기</button></p></div></div>`;return;}
  const td=todayStr();let html=`<div class="card"><div class="card-title">전체 수습 현황 · ${employees.length}명</div>`;
  employees.forEach(emp=>{
    const sc=calcSched(emp.hireDate,emp.months);
    const dotColor=m=>{if(m.status==="sent")return "pdot-sent";if(m.status==="scheduled")return "pdot-sch";if(m.status==="cancelled")return "pdot-cancelled";if(m.date<=td)return "pdot-due";return "pdot-pending";};
    const dots=emp.messages.map(m=>`<div class="pdot ${dotColor(m)}" title="${m.label}: ${m.status==="sent"?"전송완료":m.status==="scheduled"?"예약됨":m.status==="cancelled"?"취소":m.date<=td?"전송필요":"예정 ("+m.date+")"}"></div>`).join("");
    const next=emp.messages.find(m=>m.status==="pending"||m.status==="scheduled"||m.status==="cancelled");
    const badge=!next?`<span class="badge badge-green">수습 완료 ✓</span>`:next.status==="scheduled"?`<span class="badge badge-purple">📅 예약됨 · ${next.label}</span>`:next.status==="cancelled"?`<span class="badge badge-red">취소됨 · ${next.label}</span>`:`<span class="badge ${next.date<=td?"badge-red":"badge-gray"}">${next.label} · ${next.date}</span>`;
    html+=`<div class="emp-row"><div class="emp-avatar">${emp.name[0]}</div><div class="emp-meta"><div class="emp-name">${emp.name}</div><div class="emp-dept">${emp.dept} · ${emp.team} | ${emp.hireDate} – ${toISO(sc.probEnd)}</div><div style="margin-top:5px">${badge}</div><div class="progress" style="margin-top:8px">${dots}</div></div><button class="btn btn-danger btn-sm" onclick="deleteEmp('${emp.id}')">삭제</button></div>`;
  });
  html+=`<div style="display:flex;gap:14px;margin-top:12px;font-size:11px;color:#9ca3af;flex-wrap:wrap"><span><span style="display:inline-block;width:12px;height:6px;border-radius:3px;background:#10b981;vertical-align:middle;margin-right:4px"></span>전송완료</span><span><span style="display:inline-block;width:12px;height:6px;border-radius:3px;background:#8b5cf6;vertical-align:middle;margin-right:4px"></span>예약됨</span><span><span style="display:inline-block;width:12px;height:6px;border-radius:3px;background:#ef4444;vertical-align:middle;margin-right:4px"></span>전송필요</span><span><span style="display:inline-block;width:12px;height:6px;border-radius:3px;background:#d1d5db;vertical-align:middle;margin-right:4px"></span>예정</span></div></div>`;
  pane.innerHTML=html;
}
function deleteEmp(id){
  const emp=employees.find(e=>e.id===id);if(!emp)return;
  const overlay=document.createElement("div");overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center";
  overlay.innerHTML=`<div style="background:white;border-radius:14px;padding:24px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.18)"><div style="font-size:16px;font-weight:700;margin-bottom:8px">수습자 삭제</div><div style="font-size:13px;color:#6b7280;margin-bottom:20px"><b>${emp.name}</b>님의 수습 정보를 삭제할까요?<br>이 작업은 되돌릴 수 없습니다.</div><div style="display:flex;gap:8px;justify-content:flex-end"><button id="mc" style="padding:8px 16px;border:1.5px solid #d1d5db;border-radius:9px;background:white;cursor:pointer;font-size:13px;font-weight:600">취소</button><button id="mx" style="padding:8px 16px;border:none;border-radius:9px;background:#dc2626;color:white;cursor:pointer;font-size:13px;font-weight:600">삭제</button></div></div>`;
  document.body.appendChild(overlay);
  document.getElementById("mc").onclick=()=>document.body.removeChild(overlay);
  document.getElementById("mx").onclick=async()=>{document.body.removeChild(overlay);employees=employees.filter(e=>e.id!==id);await saveData();renderList();renderDash();};
}
(async()=>{
  // 로컬 스토리지로 폴백 (Claude.ai 외 환경)

    window.storage={
      _data:{},
      get:async(k)=>{const v=localStorage.getItem(k);return v?{value:v}:null},
      set:async(k,v)=>{localStorage.setItem(k,v);return{key:k,value:v}},
    };
  }
  await loadData();renderDash();
})();
