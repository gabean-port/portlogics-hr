<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채용 요건 인터뷰 · PORTLOGICS HR</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --border: #E2E0D8;
  --border-strong: #C8C6BC;
  --text: #1A1917;
  --text-muted: #6B6963;
  --text-hint: #9E9C96;
  --accent: #1A4D8F;
  --accent-light: #EBF1FA;
  --accent-mid: #2A63B5;
  --ai-bubble: #F0EEE8;
  --user-bubble: #1A4D8F;
  --user-text: #FFFFFF;
  --success: #0F6E56;
  --success-bg: #E1F5EE;
  --danger: #A32D2D;
  --danger-bg: #FCEBEB;
  --font: 'Noto Sans KR', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #18181A; --surface: #222224; --border: #333336; --border-strong: #4A4A4E;
    --text: #F0EEE8; --text-muted: #A0A09A; --text-hint: #6B6966;
    --accent: #4A8FE8; --accent-light: #1A2A40; --accent-mid: #5AA0F0;
    --ai-bubble: #2A2A2E; --success: #1D9E75; --success-bg: #0A2A20;
    --danger: #E24B4A; --danger-bg: #2A1010;
  }
}

body { font-family:var(--font); background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; font-size:14px; line-height:1.6; overflow:hidden; }

.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; z-index:10; }
.topbar-left { display:flex; align-items:center; gap:10px; }
.logo-mark { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:11px; font-weight:500; color:#fff; }
.topbar-title { font-size:14px; font-weight:600; }
.topbar-sub { font-size:12px; color:var(--text-muted); margin-left:8px; padding-left:8px; border-left:1px solid var(--border); }

.tabs { display:flex; gap:2px; background:var(--bg); border-radius:8px; padding:3px; }
.tab-btn { padding:5px 14px; border-radius:6px; font-family:var(--font); font-size:12px; font-weight:500; cursor:pointer; border:none; background:transparent; color:var(--text-muted); transition:background .15s,color .15s; display:flex; align-items:center; gap:5px; }
.tab-btn.active { background:var(--surface); color:var(--accent); border:1px solid var(--border); }
.tab-btn:not(.active):hover { color:var(--text); }

.stage-bar { display:flex; gap:5px; align-items:center; }
.stage-dot { width:6px; height:6px; border-radius:50%; background:var(--border-strong); transition:background .3s; }
.stage-dot.active { background:var(--accent); }
.stage-dot.done { background:var(--success); }
.stage-label { font-size:11px; color:var(--text-muted); font-family:var(--mono); margin-left:3px; }

.page { display:none; flex:1; overflow:hidden; flex-direction:column; }
.page.active { display:flex; }

/* 인터뷰 */
.chat-area { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
.msg { display:flex; gap:10px; max-width:85%; animation:fadeUp .22s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
.msg.ai { align-self:flex-start; }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }
.avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; flex-shrink:0; margin-top:2px; }
.avatar.ai { background:var(--accent); color:#fff; }
.avatar.user { background:var(--border-strong); color:var(--text-muted); }
.bubble { padding:10px 14px; border-radius:16px; font-size:13.5px; line-height:1.65; white-space:pre-wrap; word-break:keep-all; }
.msg.ai .bubble { background:var(--ai-bubble); border-bottom-left-radius:4px; color:var(--text); }
.msg.user .bubble { background:var(--user-bubble); border-bottom-right-radius:4px; color:var(--user-text); }
.typing { display:flex; align-items:center; gap:4px; padding:10px 14px; background:var(--ai-bubble); border-radius:16px; border-bottom-left-radius:4px; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--text-hint); animation:bounce 1.2s infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.input-area { background:var(--surface); border-top:1px solid var(--border); padding:14px 20px; display:flex; gap:10px; align-items:flex-end; flex-shrink:0; }
.input-wrap { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:8px 12px; display:flex; align-items:flex-end; transition:border-color .2s; }
.input-wrap:focus-within { border-color:var(--accent); }
#userInput { flex:1; background:transparent; border:none; outline:none; font-family:var(--font); font-size:13.5px; color:var(--text); resize:none; max-height:120px; min-height:22px; line-height:1.5; }
#userInput::placeholder { color:var(--text-hint); }
#sendBtn { width:34px; height:34px; border-radius:10px; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .2s,transform .1s; }
#sendBtn:hover{background:var(--accent-mid)} #sendBtn:active{transform:scale(.95)} #sendBtn:disabled{background:var(--border-strong);cursor:not-allowed}
#sendBtn svg{fill:white}
.gen-btn { width:100%; padding:10px; background:var(--success-bg); border:1px solid var(--success); border-radius:10px; color:var(--success); font-family:var(--font); font-size:13px; font-weight:600; cursor:pointer; transition:filter .2s; display:none; }
.gen-btn:hover{filter:brightness(.95)} .gen-btn.visible{display:block}

/* 문서 모달 */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
.overlay.open{display:flex}
.modal { background:var(--surface); border-radius:16px; width:100%; max-width:640px; max-height:90vh; display:flex; flex-direction:column; border:1px solid var(--border); }
.modal-header { padding:16px 20px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title{font-size:14px;font-weight:600}
.modal-actions{display:flex;gap:8px}
.btn-sm { padding:5px 12px; border-radius:8px; font-family:var(--font); font-size:12px; font-weight:500; cursor:pointer; transition:background .15s; }
.btn-copy{background:var(--accent-light);border:1px solid var(--accent);color:var(--accent)} .btn-copy:hover{filter:brightness(.95)}
.btn-close-modal{background:transparent;border:1px solid var(--border-strong);color:var(--text-muted)} .btn-close-modal:hover{background:var(--bg)}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.doc-content{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap}
.doc-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--text-muted);font-size:13px}

/* 잠금 화면 */
.lock-screen { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; padding:40px; }
.lock-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px 28px; width:100%; max-width:320px; display:flex; flex-direction:column; gap:16px; text-align:center; }
.lock-icon-wrap { width:48px; height:48px; border-radius:12px; background:var(--accent-light); display:flex; align-items:center; justify-content:center; margin:0 auto; font-size:22px; }
.lock-title{font-size:15px;font-weight:600}
.lock-sub{font-size:12px;color:var(--text-muted);line-height:1.6}
.pw-input { width:100%; padding:10px 12px; background:var(--bg); border:1px solid var(--border); border-radius:10px; font-family:var(--font); font-size:14px; color:var(--text); outline:none; text-align:center; letter-spacing:3px; transition:border-color .2s; }
.pw-input:focus{border-color:var(--accent)} .pw-input.error{border-color:var(--danger);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pw-error{font-size:12px;color:var(--danger);min-height:16px}
.btn-enter { width:100%; padding:10px; background:var(--accent); border:none; border-radius:10px; color:#fff; font-family:var(--font); font-size:13px; font-weight:600; cursor:pointer; transition:background .2s; }
.btn-enter:hover{background:var(--accent-mid)}

/* 대시보드 */
.dash-layout{display:flex;flex:1;overflow:hidden}
.dash-sidebar{width:280px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.dash-sidebar-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-wrap{position:relative}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-hint);font-size:12px}
.search-wrap input{width:100%;padding:7px 10px 7px 28px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)} .search-wrap input::placeholder{color:var(--text-hint)}
.dash-list{flex:1;overflow-y:auto;padding:6px 0}
.list-empty{padding:32px 16px;text-align:center;color:var(--text-hint);font-size:12px;line-height:1.8}
.list-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;position:relative}
.list-item:hover{background:var(--bg)} .list-item.active{background:var(--accent-light);border-left:2px solid var(--accent)}
.item-position{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:48px}
.item-meta{font-size:11px;color:var(--text-hint);font-family:var(--mono)}
.item-date{position:absolute;right:10px;top:11px;font-size:10px;font-family:var(--mono);color:var(--text-hint);background:var(--bg);padding:2px 5px;border-radius:4px;border:1px solid var(--border)}
.list-item.active .item-date{background:var(--accent-light)}
.btn-del-item{position:absolute;right:10px;bottom:8px;padding:2px 6px;border-radius:4px;background:transparent;border:1px solid transparent;color:var(--text-hint);font-size:10px;cursor:pointer;opacity:0;transition:opacity .15s,background .15s;font-family:var(--font)}
.list-item:hover .btn-del-item{opacity:1} .btn-del-item:hover{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}
.dash-main{flex:1;overflow-y:auto;padding:24px 28px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text-hint)}
.empty-icon{font-size:32px} .empty-title{font-size:14px;font-weight:600;color:var(--text-muted)}
.empty-sub{font-size:12px;text-align:center;line-height:1.7;max-width:240px}
.doc-view{max-width:680px}
.doc-view-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.doc-view-title{font-size:18px;font-weight:600;line-height:1.3}
.doc-view-meta{font-size:11px;color:var(--text-muted);margin-top:3px;font-family:var(--mono)}
.doc-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px 28px}
.doc-card-content{font-size:13px;line-height:1.85;color:var(--text);white-space:pre-wrap;word-break:keep-all}

.badge-count{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;font-family:var(--mono);background:var(--accent-light);color:var(--accent);border:1px solid var(--accent)}
.btn-sm-top{padding:5px 11px;border-radius:7px;background:transparent;border:1px solid var(--border-strong);color:var(--text-muted);font-family:var(--font);font-size:11px;cursor:pointer;transition:background .15s}
.btn-sm-top:hover{background:var(--bg)}
.btn-logout:hover{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}

/* 삭제 확인 */
.confirm-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.confirm-modal.open{display:flex}
.confirm-box{background:var(--surface);border-radius:12px;padding:24px;width:280px;border:1px solid var(--border)}
.confirm-title{font-size:14px;font-weight:600;margin-bottom:8px}
.confirm-msg{font-size:12px;color:var(--text-muted);margin-bottom:18px;line-height:1.6}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:6px 12px;border-radius:8px;background:transparent;border:1px solid var(--border-strong);color:var(--text-muted);font-family:var(--font);font-size:12px;cursor:pointer}
.btn-del-confirm{padding:6px 12px;border-radius:8px;background:var(--danger-bg);border:1px solid var(--danger);color:var(--danger);font-family:var(--font);font-size:12px;cursor:pointer;font-weight:500}

.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">PL</div>
    <span class="topbar-title" id="topbarTitle">채용 요건 인터뷰</span>
    <span class="topbar-sub">PORTLOGICS HR</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="stage-bar" id="stageBar">
      <div class="stage-dot active" id="s1"></div><div class="stage-dot" id="s2"></div>
      <div class="stage-dot" id="s3"></div><div class="stage-dot" id="s4"></div>
      <div class="stage-dot" id="s5"></div><div class="stage-dot" id="s6"></div>
      <div class="stage-dot" id="s7"></div><div class="stage-dot" id="s8"></div>
      <span class="stage-label" id="stageLabel">1/8</span>
    </div>
    <div id="dashControls" style="display:none;align-items:center;gap:6px;">
      <span class="badge-count" id="totalBadge">0건</span>
      <button class="btn-sm-top" onclick="loadRecords()">새로고침</button>
      <button class="btn-sm-top btn-logout" onclick="lockDashboard()">잠금</button>
    </div>
    <div class="tabs">
      <button class="tab-btn active" id="tabInterview" onclick="switchTab('interview')">인터뷰</button>
      <button class="tab-btn" id="tabDash" onclick="switchTab('dash')">🔒 HR 대시보드</button>
    </div>
  </div>
</div>

<!-- 인터뷰 페이지 -->
<div class="page active" id="pageInterview">
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
      <button class="gen-btn" id="genBtn" onclick="openDocModal()">✅ 인터뷰 종료하기</button>
      <p id="saveNotice" style="display:none; font-size:11px; color:var(--text-muted); text-align:center; line-height:1.6;">인터뷰 내용은 <strong style="color:var(--success);">인터뷰 종료하기</strong> 버튼을 눌러야 저장됩니다.</p>
      <div class="input-wrap">
        <textarea id="userInput" placeholder="메시지를 입력하세요…" rows="1"></textarea>
      </div>
    </div>
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="15" height="15" viewBox="0 0 16 16"><path d="M1 8L15 1 8 15l-1.5-5.5L1 8z"/></svg>
    </button>
  </div>
</div>

<!-- 대시보드 페이지 -->
<div class="page" id="pageDash">
  <!-- 잠금 화면 -->
  <div class="lock-screen" id="lockScreen">
    <div class="lock-card">
      <div class="lock-icon-wrap">🔒</div>
      <div class="lock-title">HR 전용 대시보드</div>
      <div class="lock-sub">인사팀만 접근할 수 있습니다.<br>비밀번호를 입력해주세요.</div>
      <input type="password" class="pw-input" id="pwInput" placeholder="••••••" maxlength="20"
        onkeydown="if(event.key==='Enter')checkPassword()">
      <div class="pw-error" id="pwError"></div>
      <button class="btn-enter" onclick="checkPassword()">입장하기</button>
    </div>
  </div>
  <!-- 대시보드 본문 -->
  <div class="dash-layout" id="dashContent" style="display:none;">
    <div class="dash-sidebar">
      <div class="dash-sidebar-header">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="직무명으로 검색…" oninput="filterList()">
        </div>
      </div>
      <div class="dash-list" id="listArea">
        <div style="display:flex;align-items:center;justify-content:center;height:120px;">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
    <div class="dash-main" id="dashMain">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">채용 요건을 선택하세요</div>
        <div class="empty-sub">왼쪽 목록에서 항목을 클릭하면 내용을 확인할 수 있습니다.</div>
      </div>
    </div>
  </div>
</div>

<!-- 문서 모달 -->
<div class="overlay" id="docOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">채용 요건 정리 문서</span>
      <div class="modal-actions">
        <button class="btn-sm btn-copy" onclick="copyText(docText)">복사하기</button>
        <button class="btn-sm btn-close-modal" onclick="closeDocModal()">닫기</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="doc-loading" id="docLoading"><div class="spinner"></div><span>문서를 생성하고 있습니다…</span></div>
      <div class="doc-content" id="docContent" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-box">
    <div class="confirm-title">기록 삭제</div>
    <div class="confirm-msg" id="confirmMsg">이 채용 요건 기록을 삭제하시겠습니까?</div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">취소</button>
      <button class="btn-del-confirm" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── 비밀번호 설정 (변경 시 여기만 수정) ── */
const HR_PASSWORD = '20210715';

/* ── 시스템 프롬프트 ── */
const SYSTEM_PROMPT = `당신은 포트로직스(PORTLOGICS)의 채용 인터뷰 AI입니다. 채용 담당자(현업 팀 리더 또는 매니저)와 대화하여 새로운 포지션의 채용 요건을 체계적으로 수집하는 것이 목표입니다.

다음 8단계 인터뷰를 한 번에 하나씩 질문하며 진행하세요:

인터뷰 시작 시 첫 메시지는 반드시 아래 문구를 그대로 사용하세요:
"안녕하세요! 포트로직스 채용 인터뷰 AI입니다 😊
채용을 위해 인터뷰를 진행할 예정이며, 이는 이력서 스크리닝 기준 문서로 생성됩니다.

1단계 - 소속 및 채용 직무: 이번에 채용하려는 포지션의 소속 팀/부서와 직무가 무엇인지 함께 확인. 둘 중 하나라도 모호하면 각각 추가 질문하여 명확히 파악.
2단계 - 채용 배경: 이번 채용이 필요하게 된 배경이나 이유 확인. 짧으면 "신규 포지션인가요, 아니면 기존 결원이나 인원 보강인가요?" 추가 질문.
3단계 - 희망 조건: 희망하는 경력 연차, 연령대, 성별 확인. 성별/연령은 참고용임을 자연스럽게 안내하며 질문.
4단계 - 예상 직급·연봉: 이 포지션의 예상 직급(직책)과 연봉 범위 확인. 연봉은 반드시 범위(예: 3,500~4,500만원)로 입력받아야 하며, 단일 숫자나 "미정"으로 답하면 "연봉 범위는 이력서 검토 기준이 되기 때문에 반드시 필요합니다. 최소~최대 범위로 말씀해 주시겠어요?" 라고 재질문하여 반드시 범위를 받아낸다.
5단계 - 담당 업무 (심화): 이 단계는 이력서 스크리닝의 가장 핵심 기준이 되므로 특히 꼼꼼하고 철저하게 진행한다. 업무를 최대한 구체적으로 파악할 때까지 반복 질문한다. 답변이 3개 미만이거나 추상적이면 반드시 추가 질문한다. 업무 파악 후 "그렇다면 이력서에서 어떤 키워드나 경력이 보이는 분이면 좋을까요?"로 이어서 이력서 스크리닝 기준도 함께 수집한다. 아래 심화 질문을 필요에 따라 활용한다: "각 업무에서 어떤 툴이나 기술을 실제로 사용하나요?", "유사한 업무를 경험해봤을 법한 회사나 직무가 있다면요?", "이 업무를 잘 수행한 사람과 그렇지 못한 사람의 차이는 무엇이었나요?", "하루/한 주 업무 흐름을 예시로 설명해주실 수 있나요?" 등. 이 단계는 담당자가 충분히 상세하게 답했다고 판단될 때까지 다음 단계로 넘어가지 않는다.
6단계 - 우대 사항: 필수는 아니지만 있으면 좋은 경험이나 역량 확인. 없다고 하면 넘어감.
7단계 - 희망 입사일: 희망하는 입사 시작일 확인. 미정이면 "빠른 채용이 필요한 상황인지" 확인.
8단계 - HR 전달 사항: HR 팀에 이번 채용과 관련해 따로 전달하고 싶은 내용 확인. 없다고 하면 인터뷰 종료.

규칙:
- 반드시 한국어로 대화하세요
- 한 번에 하나의 질문만 하세요
- 답변이 모호하거나 짧으면 한 번 더 구체적으로 물어보세요
- 5단계(담당 업무)는 특히 충분히 상세한 정보가 나올 때까지 심화 질문을 반복하세요
- 각 단계가 충분히 채워지면 다음 단계로 넘어가세요
- 8단계 인터뷰가 모두 완료되면 다음 문장으로 마무리하세요: "인터뷰가 완료되었습니다. 아래 '인터뷰 종료하기' 버튼을 눌러 최종 문서를 확인해보세요."
- 친근하지만 전문적인 톤을 유지하세요

현재 단계를 추적하고, 단계가 바뀔 때마다 응답 맨 앞에 [STAGE:N] 형식으로 표시하세요 (N은 1~8, 완료시 9). 이 태그는 화면에 표시되지 않습니다.

/* ── 탭 전환 ── */
let dashUnlocked = false;

function switchTab(tab) {
  const isInterview = tab === 'interview';
  document.getElementById('pageInterview').classList.toggle('active', isInterview);
  document.getElementById('pageDash').classList.toggle('active', !isInterview);
  document.getElementById('tabInterview').classList.toggle('active', isInterview);
  document.getElementById('tabDash').classList.toggle('active', !isInterview);
  document.getElementById('stageBar').style.display = isInterview ? 'flex' : 'none';
  document.getElementById('dashControls').style.display = isInterview ? 'none' : 'flex';
  document.getElementById('topbarTitle').textContent = isInterview ? '채용 요건 인터뷰' : 'HR 대시보드';
  if (!isInterview && dashUnlocked) { showDashContent(); loadRecords(); }
}

function lockDashboard() {
  dashUnlocked = false;
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('dashContent').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').textContent = '';
}

function checkPassword() {
  const val = document.getElementById('pwInput').value;
  if (val === HR_PASSWORD) {
    dashUnlocked = true;
    showDashContent();
    loadRecords();
  } else {
    const inp = document.getElementById('pwInput');
    inp.classList.add('error');
    document.getElementById('pwError').textContent = '비밀번호가 올바르지 않습니다.';
    setTimeout(() => inp.classList.remove('error'), 400);
    inp.value = '';
  }
}

function showDashContent() {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('dashContent').style.display = 'flex';
}

/* ── 인터뷰 ── */
let messages = [], stage = 1, interviewDone = false, docText = '';
const chatArea = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const genBtn = document.getElementById('genBtn');
const stageDots = [null, ...Array.from({length:8},(_,i)=>document.getElementById('s'+(i+1)))];
const stageLabel = document.getElementById('stageLabel');

function updateStage(n) {
  stage = n;
  for(let i=1;i<=8;i++) stageDots[i].className='stage-dot'+(i<n?' done':i===n?' active':'');
  stageLabel.textContent = n<=8 ? n+'/8' : '완료';
}

function appendMsg(role, text) {
  const el=document.createElement('div'); el.className='msg '+role;
  const av=document.createElement('div'); av.className='avatar '+role; av.textContent=role==='ai'?'AI':'나';
  const bb=document.createElement('div'); bb.className='bubble';
  bb.innerHTML=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  el.appendChild(av); el.appendChild(bb); chatArea.appendChild(el);
  chatArea.scrollTop=chatArea.scrollHeight;
}

function showTyping() {
  const el=document.createElement('div'); el.className='msg ai'; el.id='typingEl';
  const av=document.createElement('div'); av.className='avatar ai'; av.textContent='AI';
  const t=document.createElement('div'); t.className='typing';
  for(let i=0;i<3;i++){const d=document.createElement('div');d.className='dot';t.appendChild(d);}
  el.appendChild(av); el.appendChild(t); chatArea.appendChild(el); chatArea.scrollTop=chatArea.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typingEl');if(t)t.remove();}

function parseStage(text){
  const m=text.match(/\[STAGE:(\d+)\]/);
  if(m){const n=parseInt(m[1]);updateStage(n);if(n===9){interviewDone=true;genBtn.classList.add('visible');document.getElementById('saveNotice').style.display='block';}return text.replace(/\[STAGE:\d+\]\s*/,'');}
  return text;
}

async function callAPI(msgs){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:msgs})});
  if(!r.ok)throw new Error(r.status);
  return (await r.json()).content[0]?.text||'';
}

async function sendMessage(){
  const text=userInput.value.trim(); if(!text||sendBtn.disabled)return;
  userInput.value=''; userInput.style.height='auto'; sendBtn.disabled=true;
  appendMsg('user',text); messages.push({role:'user',content:text}); showTyping();
  try{const raw=await callAPI(messages);removeTyping();appendMsg('ai',parseStage(raw));messages.push({role:'assistant',content:raw});}
  catch(e){removeTyping();appendMsg('ai','오류가 발생했습니다. 잠시 후 다시 시도해주세요.');}
  sendBtn.disabled=false; userInput.focus();
}

async function openDocModal(){
  document.getElementById('docOverlay').classList.add('open');
  document.getElementById('docLoading').style.display='flex';
  document.getElementById('docContent').style.display='none';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:SYSTEM_PROMPT,messages:[...messages,{role:'user',content:'[[GENERATE_DOCUMENT]]'}]})});
    const d=await r.json(); docText=d.content[0]?.text||'';
    try{
      const tm=docText.match(/^# (.+)$/m);
      const pos=tm?tm[1].replace(' 채용 요건 정리','').trim():'포지션 미상';
      const key='interviews:'+Date.now();
      await window.storage.set(key,JSON.stringify({id:key,position:pos,date:new Date().toISOString(),document:docText}),true);
    }catch(e){}
    document.getElementById('docLoading').style.display='none';
    const el=document.getElementById('docContent'); el.innerHTML=renderMd(docText); el.style.display='block';
  }catch(e){document.getElementById('docLoading').innerHTML='<span style="color:var(--text-muted)">문서 생성에 실패했습니다.</span>';}
}

function closeDocModal(){document.getElementById('docOverlay').classList.remove('open');}

userInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
userInput.addEventListener('input',()=>{userInput.style.height='auto';userInput.style.height=Math.min(userInput.scrollHeight,120)+'px';});
document.getElementById('docOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('docOverlay'))closeDocModal();});

/* ── 대시보드 ── */
let allRecords=[],selectedId=null,deleteTargetId=null;

function fmtDate(iso){const d=new Date(iso);return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}
function fmtFull(iso){const d=new Date(iso);return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function daysAgo(iso){const diff=Date.now()-new Date(iso).getTime();const d=Math.floor(diff/86400000);return d===0?'오늘':d===1?'어제':d+'일 전';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

async function loadRecords(){
  try{
    const res=await window.storage.list('interviews:',true); const keys=res?.keys||[];
    const records=[];
    for(const key of keys){try{const it=await window.storage.get(key,true);if(it?.value)records.push(JSON.parse(it.value));}catch(e){}}
    records.sort((a,b)=>new Date(b.date)-new Date(a.date)); allRecords=records;
    renderList(records);
    document.getElementById('totalBadge').textContent=records.length+'건';
    if(records.length>0&&!selectedId)selectRecord(records[0].id);
    else if(selectedId){const f=records.find(r=>r.id===selectedId);f?renderDoc(f):showEmptyMain();}
    else showEmptyMain();
  }catch(e){document.getElementById('listArea').innerHTML='<div class="list-empty">데이터를 불러오지 못했습니다.</div>';}
}

function renderList(records){
  const area=document.getElementById('listArea');
  if(!records.length){area.innerHTML='<div class="list-empty">저장된 채용 요건이 없습니다.<br><small>인터뷰 완료 후 문서를 생성하면<br>여기에 자동 기록됩니다.</small></div>';return;}
  area.innerHTML=records.map(r=>`<div class="list-item ${r.id===selectedId?'active':''}" onclick="selectRecord('${r.id}')">
    <div class="item-position">${esc(r.position)}</div>
    <div class="item-meta">${daysAgo(r.date)}</div>
    <div class="item-date">${fmtDate(r.date)}</div>
    <button class="btn-del-item" onclick="event.stopPropagation();askDelete('${r.id}','${esc(r.position)}')">삭제</button>
  </div>`).join('');
}

function filterList(){const q=document.getElementById('searchInput').value.toLowerCase();renderList(q?allRecords.filter(r=>r.position.toLowerCase().includes(q)):allRecords);}
function selectRecord(id){selectedId=id;filterList();const rec=allRecords.find(r=>r.id===id);if(rec)renderDoc(rec);}

function renderDoc(rec){
  window._curDoc=rec.document;
  document.getElementById('dashMain').innerHTML=`<div class="doc-view">
    <div class="doc-view-header">
      <div><div class="doc-view-title">${esc(rec.position)} 채용 요건</div><div class="doc-view-meta">작성일: ${fmtFull(rec.date)}</div></div>
      <button class="btn-sm btn-copy" onclick="copyText(window._curDoc)">복사하기</button>
    </div>
    <div class="doc-card"><div class="doc-card-content">${renderMd(rec.document)}</div></div>
  </div>`;
}

function showEmptyMain(){document.getElementById('dashMain').innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">채용 요건을 선택하세요</div><div class="empty-sub">왼쪽 목록에서 항목을 클릭하면 내용을 확인할 수 있습니다.</div></div>`;}
function askDelete(id,pos){deleteTargetId=id;document.getElementById('confirmMsg').textContent=`"${pos}" 채용 요건 기록을 삭제하시겠습니까?`;document.getElementById('confirmModal').classList.add('open');}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('open');deleteTargetId=null;}
async function confirmDelete(){
  if(!deleteTargetId)return;
  try{await window.storage.delete(deleteTargetId,true);if(selectedId===deleteTargetId)selectedId=null;deleteTargetId=null;closeConfirm();await loadRecords();}
  catch(e){closeConfirm();showToast('삭제에 실패했습니다.');}
}
document.getElementById('confirmModal').addEventListener('click',e=>{if(e.target===document.getElementById('confirmModal'))closeConfirm();});

/* ── 공통 ── */
function renderMd(text){
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^# (.+)$/gm,'<h2 style="font-size:16px;font-weight:600;margin:0 0 12px;color:var(--text)">$1</h2>')
    .replace(/^## (.+)$/gm,'<h3 style="font-size:13px;font-weight:600;margin:16px 0 6px;color:var(--accent)">$1</h3>')
    .replace(/^---$/gm,'<hr style="border:none;border-top:1px solid var(--border);margin:12px 0">')
    .replace(/\n/g,'<br>');
}
function copyText(text){navigator.clipboard.writeText(text).then(()=>showToast('클립보드에 복사되었습니다'));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

/* ── 초기화 ── */
(async()=>{
  sendBtn.disabled=true; showTyping();
  try{
    const raw=await callAPI([{role:'user',content:'인터뷰를 시작해주세요.'}]);
    removeTyping(); appendMsg('ai',parseStage(raw));
    messages.push({role:'user',content:'인터뷰를 시작해주세요.'});
    messages.push({role:'assistant',content:raw});
  }catch(e){removeTyping();appendMsg('ai','안녕하세요! 포트로직스 채용 인터뷰 AI입니다 😊\n채용을 위해 인터뷰를 진행할 예정이며, 이는 이력서 스크리닝 기준 문서로 생성됩니다.\n\n먼저, 채용하려는 소속 팀/부서와 직무를 말씀해 주세요!');}
  sendBtn.disabled=false; userInput.focus();
})();
</script>
