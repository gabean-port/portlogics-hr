<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PORTLOGICS HR</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0b0f1a;
      --surface:   #111827;
      --border:    #1e2d45;
      --accent:    #3b82f6;
      --accent2:   #06b6d4;
      --text:      #f0f4ff;
      --muted:     #64748b;
      --card-bg:   #141c2e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glow orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 500px; height: 500px; background: rgba(59,130,246,.12); top: -120px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: rgba(6,182,212,.08); bottom: -80px; right: -60px; }

    /* ── Layout ── */
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 32px 100px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 64px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
      animation: fadeUp .6s ease both;
    }

    .logo-block {}
    .logo-eyebrow {
      font-size: 11px;
      letter-spacing: .18em;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .logo-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1;
    }
    .logo-title span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-meta {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.8;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 20px;
      animation: fadeUp .6s .1s ease both;
    }

    /* ── Cards grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 60px;
    }

    @media (max-width: 620px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 28px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      overflow: hidden;
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
      animation: fadeUp .6s ease both;
    }

    .card:nth-child(1) { animation-delay: .15s; }
    .card:nth-child(2) { animation-delay: .22s; }
    .card:nth-child(3) { animation-delay: .29s; }
    .card:nth-child(4) { animation-delay: .36s; }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(59,130,246,.06), transparent 60%);
      opacity: 0;
      transition: opacity .3s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(59,130,246,.5);
      box-shadow: 0 20px 48px rgba(0,0,0,.4), 0 0 0 1px rgba(59,130,246,.15);
    }
    .card:hover::before { opacity: 1; }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(59,130,246,.2), rgba(6,182,212,.1));
      border: 1px solid rgba(59,130,246,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .card-body { flex: 1; }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -.01em;
      margin-bottom: 6px;
      color: var(--text);
    }
    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
    }

    .card-arrow {
      align-self: flex-end;
      font-size: 18px;
      color: var(--muted);
      transition: color .2s, transform .2s;
    }
    .card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      animation: fadeUp .6s .4s ease both;
    }

    /* ── Animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="wrapper">
    <header>
      <div class="logo-block">
        <div class="logo-eyebrow">Internal Tools</div>
        <div class="logo-title">PORTLOGICS <span>HR</span></div>
      </div>
      <div class="header-meta">
        <div>인사팀 전용 툴 모음</div>
        <div id="today"></div>
      </div>
    </header>

    <div class="section-label">HR Tools</div>

    <div class="grid">

      <a class="card" href="probation.html">
        <div class="card-icon">📋</div>
        <div class="card-body">
          <div class="card-title">수습 관리</div>
          <div class="card-desc">신규 입사자 수습 기간 관리 및 평가 일정 자동화</div>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <a class="card" href="onboarding.html">
        <div class="card-icon">🚀</div>
        <div class="card-body">
          <div class="card-title">온보딩</div>
          <div class="card-desc">신규 입사자를 위한 인터랙티브 온보딩 가이드</div>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <a class="card" href="interview.html">
        <div class="card-icon">🎯</div>
        <div class="card-body">
          <div class="card-title">채용 인터뷰</div>
          <div class="card-desc">면접 진행 및 후보자 평가 지원 툴</div>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <a class="card" href="booking.html">
        <div class="card-icon">✈️</div>
        <div class="card-body">
          <div class="card-title">출장 부킹</div>
          <div class="card-desc">임원 출장 항공·숙박·비자 통합 예약 관리</div>
        </div>
        <div class="card-arrow">→</div>
      </a>

    </div>

    <footer>
      <span>© 2025 PORTLOGICS · People Team</span>
      <span>Internal use only</span>
    </footer>
  </div>

  <script>
    const d = new Date();
    document.getElementById('today').textContent =
      d.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
  </script>
</body>
</html>
